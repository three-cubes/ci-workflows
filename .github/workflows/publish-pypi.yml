name: publish-pypi

# Reusable (workflow_call) PyPI publish for three-cubes Python packages.
#
# Promotes kairix's publish-pypi.yml into the shared org CI set: build the sdist
# + wheel, publish to PyPI via Trusted Publishing (OIDC — NO stored PyPI token)
# with PEP 740 attestations, then verify the release actually installs FROM PyPI
# and imports. Parametrised so any three-cubes package (kairix today, tc-fitness
# next) publishes through one workflow instead of a per-repo copy.
#
# Trusted Publishing: the `publish` job requests a short-lived OIDC token
# (id-token: write) that PyPI exchanges for an upload credential — no API token
# is stored or passed as a secret. The repo must be registered as a PyPI trusted
# publisher and the target GitHub environment (stable-environment /
# alpha-environment) configured. See https://docs.pypi.org/trusted-publishers/.
#
# Alpha-vs-stable routing (preserved verbatim from kairix's original): pre-release
# tags publish through `alpha-environment` (0-min protection timer); stable tags
# through `stable-environment` (protection timer for human review). Detection:
# `github.event.release.prerelease` fires for pre-release tags created from the
# GitHub UI; `is-alpha` is set by an alpha-release workflow_dispatch caller (where
# there is no release event to read prerelease from).
#
# The caller's THIN workflow owns the `on:` triggers (release / workflow_dispatch)
# and the release HITL gate — this reusable only builds, publishes, and verifies.
# All caller inputs are env-bound before reaching a shell body (never interpolated
# into a `run:` string) so a value can't break out of its string context —
# injection-safe per the org workflow standard.
#
# Part of the Autonomous Delivery Platform roadmap (SGO-188); org CI
# consolidation lineage (three-cubes/kairix#499 Phase 4).

on:
  workflow_call:
    inputs:
      # ── Package identity ────────────────────────────────────────────────
      dist-name:
        description: >-
          PyPI distribution name pip resolves (e.g. kairix-agentic-knowledge-mgt).
          May differ from the import name; it is the publish target and the
          `pip install <dist-name>==<version>` the verify leg installs.
        type: string
        default: "kairix-agentic-knowledge-mgt"
      import-name:
        description: >-
          Python import package name (e.g. kairix). The verify leg asserts
          `import <import-name>` succeeds after installing from PyPI.
        type: string
        default: "kairix"
      console-script:
        description: >-
          Console-script entry point the verify leg smoke-tests with `--version`
          (e.g. kairix). Empty string skips the console-script smoke.
        type: string
        default: "kairix"
      # ── Environment routing (alpha vs stable) ───────────────────────────
      stable-environment:
        description: >-
          GitHub environment stable (non-prerelease) tags publish through. It
          carries the trusted-publisher binding + the protection timer for review.
        type: string
        default: "release"
      alpha-environment:
        description: >-
          GitHub environment pre-release / alpha tags publish through (kairix
          runs this with a 0-min protection timer).
        type: string
        default: "release-alpha"
      is-alpha:
        description: >-
          Set true to force the alpha-environment route for a tag published via
          workflow_dispatch, where github.event.release.prerelease is absent.
          Mirrors kairix release-alpha.yml's dispatch.
        type: boolean
        default: false
      # ── Source + toolchain ──────────────────────────────────────────────
      ref:
        description: >-
          Git tag to build + publish. Empty (default) derives the ref from the
          triggering event (github.ref — the tag ref on a release event). A
          workflow_dispatch caller passes the tag explicitly here.
        type: string
        default: ""
      python-version:
        description: "Python used for the install-from-PyPI verify smoke."
        type: string
        default: "3.12"

permissions:
  contents: read

env:
  # Node 24 shim for JS actions on older runner images; harmless when the
  # runner already defaults to node24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Explicit ref for a workflow_dispatch caller; else the triggering
          # tag ref (github.ref on a release event).
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}
          fetch-depth: 0  # setuptools-scm needs full history to derive the version

      - name: Build + inspect sdist and wheel
        uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Alpha tags publish through alpha-environment (0-min timer); stable tags
    # through stable-environment. release.prerelease fires for pre-release tags
    # from the GitHub UI; is-alpha is set by an alpha-release dispatch caller.
    environment: ${{ (github.event.release.prerelease || inputs.is-alpha) && inputs.alpha-environment || inputs.stable-environment }}
    permissions:
      id-token: write  # Trusted Publishing OIDC exchange — no stored PyPI token
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: dist/

      - name: Publish to PyPI (Trusted Publishing + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  verify:
    name: Verify install
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read  # smoke-test only installs + imports — no repo writes needed
    steps:
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install from PyPI and smoke test
        shell: bash
        # dist-name differs from import-name for some packages (kairix installs
        # as kairix-agentic-knowledge-mgt, imports as kairix). dist/import/console
        # + the tag are env-bound — never interpolated into the body — so the
        # values can't break the shell (injection-safe per the org standard).
        #
        # PyPI CDN propagation is variable (60-180s observed on alpha tags), so
        # the install retries rather than using a fixed sleep: 6 x 30s = 3 min
        # upper bound, covering every propagation latency observed to date.
        env:
          DIST_NAME: ${{ inputs.dist-name }}
          IMPORT_NAME: ${{ inputs.import-name }}
          CONSOLE_SCRIPT: ${{ inputs.console-script }}
          # release event provides .release.tag_name; a workflow_dispatch caller
          # passes the tag via inputs.ref.
          TAG_NAME: ${{ github.event.release.tag_name || inputs.ref }}
        run: |
          set -euo pipefail

          if [ -z "$TAG_NAME" ]; then
            echo "::error::verify: no tag to verify —" \
              "trigger on a release or pass the ref input." >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          PKG="${DIST_NAME}==${VERSION}"
          for attempt in 1 2 3 4 5 6; do
            echo "verify attempt ${attempt}/6 - pip install ${PKG}"
            if pip install "${PKG}"; then
              echo "verify: install succeeded on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" = "6" ]; then
              echo "verify: install failed after 6 attempts x 30s" >&2
              exit 1
            fi
            echo "verify: install missed propagation; sleeping 30s before retry"
            sleep 30
          done

          # The import name is read from the environment INSIDE python (quoted
          # heredoc = no shell expansion), so the module name can't reach the
          # shell as code.
          python - <<'PY'
          import importlib
          import os

          name = os.environ["IMPORT_NAME"]
          module = importlib.import_module(name)
          version = getattr(module, "__version__", "unknown")
          print(f"{name} {version} installed successfully")
          PY

          if [ -n "$CONSOLE_SCRIPT" ]; then
            "$CONSOLE_SCRIPT" --version
          fi
