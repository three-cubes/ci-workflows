# Dependabot — Golden Path baseline (template).
#
# Policy: a 3-day cooldown across ALL updates (security, patch, minor, major).
# The supply-chain attack surface (worms injected into popular packages, then
# patch-released as silent "security fixes") is the dominant risk; the 3-day
# window lets the community surface compromise before we pull, applied
# uniformly so the operator never has to remember which tier an update sits in.
#
# Keep the repo-level `dependabot_security_updates` toggle OFF so security-
# advisory PRs also respect this cooldown (alerts still surface independently;
# a CISA-KEV known-exploited CVE is the operator's signal to override manually).
#
# Trim/extend the ecosystems + `directory` entries to match your repo. Every
# listed directory MUST contain a parseable manifest on disk, or it silently
# produces no PRs. Reference:
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference

version: 2

updates:
  # ----- pip / python -----
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 3
      semver-major-days: 3
    groups:
      python-deps:
        update-types: ["minor", "patch"]
      python-major:
        update-types: ["major"]
    commit-message:
      prefix: "deps"
      include: "scope"

  # ----- npm (drop if the repo ships no JS/TS) -----
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 3
      semver-major-days: 3
    groups:
      production-deps:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      production-major:
        dependency-type: "production"
        update-types: ["major"]
      dev-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      dev-major:
        dependency-type: "development"
        update-types: ["major"]
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"

  # ----- github actions -----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 3
      semver-major-days: 3
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
      include: "scope"
